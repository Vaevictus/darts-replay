name: Release

# Cut a release by pushing a tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
# Produces: a multi-arch container image on GHCR, and per-arch .deb packages
# attached to the GitHub Release.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the Release + upload assets
  packages: write   # push the image to GHCR

jobs:
  # -------- .deb packages (native runners, one per arch) --------
  deb:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash packaging/deb/build-deb.sh "$VERSION" "${{ matrix.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: dist/*.deb

  # -------- multi-arch container image on GHCR --------
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/vaevictus/darts-replay:latest
            ghcr.io/vaevictus/darts-replay:${{ github.ref_name }}

  # -------- attach the .debs to the GitHub Release --------
  release:
    needs: [deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          merge-multiple: true
          path: dist
      - name: Create release and upload .debs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*.deb
